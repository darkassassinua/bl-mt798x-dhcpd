name: FIP Build

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      MODEL:
        description: 'Model selection'
        required: true
        default: 'cmcc_a10'
        type: string
      FIP_VERSION: 
        description: 'FIP version selection ("all" option is only for single model builds)'
        required: true
        default: '2025'
        type: choice
        options:
          - 2025
          - SP1
          - SP2
          - all
      VARIANT:
        description: 'Build variant ("all" option is only for single model builds)'
        required: false
        default: 'default'
        type: choice
        options:
          - default
          - ubootmod
          - nonmbm
          - openwrt
          - all
      EXTRA_OPTION:
        description: 'Extra option'
        required: false
        default: 'default'
        type: choice
        options:
          - default
          - multi_layout
          - dis_fixed_mtdparts
      REPO_URL:
        description: 'Source repository'
        required: true
        default: 'https://github.com/Yuzhii0718/bl-mt798x-dhcpd'
        type: string
      REPO_BRANCH:
        description: 'Repository branch'
        required: true
        default: 'auto'
        type: string
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'
      save_disk:
        description: 'Free up disk space(build environment)'
        required: false
        default: 'false'
        type: boolean
      pub_release:
        description: 'Publish to GitHub Release'
        required: false
        default: 'true'
        type: boolean
#  schedule:
#    - cron: 0 16 * * *

env:
  UPLOAD_TAG_NAME: ${{ github.event.inputs.MODEL }}
  REPO_URL: ${{ github.event.inputs.REPO_URL }}
  REPO_BRANCH_INPUT: ${{ github.event.inputs.REPO_BRANCH }}
  FIP_VERSION_INPUT: ${{ github.event.inputs.FIP_VERSION || github.event.client_payload.FIP_VERSION || '2025' }}
  SSH_ACTIONS: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
          matrix:
            os:
              - ubuntu-22.04

    permissions:
      contents: write

    steps:
    - name: Configuration check
      shell: bash
      run: |
        set -euo pipefail

        VARIANT_IN="${{ github.event.inputs.VARIANT }}"
        EXTRA_IN="${{ github.event.inputs.EXTRA_OPTION }}"
        MODEL_IN="${{ github.event.inputs.MODEL }}"

        case "$VARIANT_IN" in
          default|all|ubootmod|nonmbm|openwrt) ;;
          *)
            echo "Error: invalid VARIANT: '$VARIANT_IN' (expected default/all/ubootmod/nonmbm/openwrt)" >&2
            exit 1
            ;;
        esac
        if [ "$VARIANT_IN" = "all" ] && [ "$MODEL_IN" = "all" ]; then
          echo "Error: VARIANT=all is only supported for single-model builds (MODEL must not be 'all')." >&2
          exit 1
        fi


        case "$EXTRA_IN" in
          default|multi_layout|dis_fixed_mtdparts) ;;
          *)
            echo "Error: invalid EXTRA_OPTION: '$EXTRA_IN' (expected default/multi_layout/dis_fixed_mtdparts)" >&2
            exit 1
            ;;
        esac

        # Note: Makefile handles the underlying build command; EXTRA_OPTION still applies to all versions
        FIP_INPUT="$FIP_VERSION_INPUT"
        FIP_INPUT="$(echo "$FIP_INPUT" | tr -d '\r' | sed -e 's/^[[:space:]]*//;s/[[:space:]]*$//')"
        if [[ "$FIP_INPUT" =~ ^(.+)-(mt798[0-9]+)$ ]]; then
          FIP_INPUT="${BASH_REMATCH[1]}"
        fi
        if [ "$FIP_INPUT" != "all" ] && ! echo ",${FIP_INPUT}," | grep -Eq ',(SP1|SP2|2025)(,|$)'; then
          echo "Error: unsupported FIP_VERSION '$FIP_INPUT' (supported: 2025/SP1/SP2/all)." >&2
          exit 1
        fi

        if [ "$EXTRA_IN" = "multi_layout" ]; then
          if [ "$VARIANT_IN" = "ubootmod" ] || [ "$VARIANT_IN" = "openwrt" ]; then
            echo "Note: VARIANT=$VARIANT_IN does not support multi_layout; MULTI_LAYOUT will be forced off."
          fi
        fi

        if [ "${{ github.event.inputs.pub_release }}" = "false" ]; then
          echo "UPLOAD_RELEASE=false" >> $GITHUB_ENV
        fi

    - name: Clean disk space (local1)
      if: github.event.inputs.save_disk == 'true' && !cancelled()
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc

    - name: Checkout source
      run: |
        set -euo pipefail
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
        cd /workdir
        df -hT $PWD

        REPO_URL_IN="$REPO_URL"
        REPO_BRANCH_IN="$REPO_BRANCH_INPUT"

        # Auto-detect branch logic: if REPO_BRANCH=auto, use master
        if [ -n "$REPO_BRANCH_IN" ] && [ "$REPO_BRANCH_IN" != "auto" ]; then
          REPO_REF="$REPO_BRANCH_IN"
        else
          REPO_REF="master"
        fi

        echo "Using source: $REPO_URL_IN (ref: $REPO_REF)"
        git clone --depth 1 --branch "$REPO_REF" "$REPO_URL_IN" bl-mt798x-dhcpd

        SOURCE_SHA="$(git -C bl-mt798x-dhcpd rev-parse HEAD)"
        echo "REPO_BRANCH=$REPO_REF" >> "$GITHUB_ENV"
        echo "SOURCE_SHA=$SOURCE_SHA" >> "$GITHUB_ENV"
        ln -sf /workdir/bl-mt798x-dhcpd $GITHUB_WORKSPACE/bl-mt798x-dhcpd

    - name: Initialize build environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(cat $GITHUB_WORKSPACE/bl-mt798x-dhcpd/depends/${{ matrix.os }})
        sudo -E apt-get -qq install rename tar
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clean disk space (local2)
      if: github.event.inputs.save_disk == 'true' && !cancelled()
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean

    - name: Clean disk space (plugin)
      if: github.event.inputs.save_disk == 'true' && !cancelled()
      uses: jlumbroso/free-disk-space@main
      with:
        # this might remove tools that are actually needed,
        # when set to "true" but frees about 6 GB
        tool-cache: true
        
        # all of these default to true, but feel free to set to
        # "false" if necessary for your workflow
        android: false
        dotnet: false
        haskell: false
        large-packages: false
        swap-storage: false

    - name: SSH connection management
      uses: P3TERX/ssh2actions@v1.0.0
      if: (github.event.inputs.ssh == 'true' && github.event.inputs.ssh  != 'false') || contains(github.event.action, 'ssh')
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    - name: Parse model lists
      run: |
        set -euo pipefail
        cd bl-mt798x-dhcpd
        mkdir -p model_lists

        FIP_INPUT="$FIP_VERSION_INPUT"
        FIP_INPUT="$(echo "$FIP_INPUT" | tr -d '\r' | sed -e 's/^[[:space:]]*//;s/[[:space:]]*$//')"
        SOC_FILTER=""
        if [[ "$FIP_INPUT" =~ ^(.+)-(mt798[0-9]+)$ ]]; then
          FIP_INPUT="${BASH_REMATCH[1]}"
          SOC_FILTER="${BASH_REMATCH[2]}"
          echo "Detected platform filter: $SOC_FILTER (will only generate model lists for that platform)"
        fi

        # Parse the list of versions to process based on FIP_INPUT
        if [ "$FIP_INPUT" = "all" ]; then
          SUPPORTED_VERSIONS=("SP1" "SP2" "2025")
          echo "Detected 'all', will parse: ${SUPPORTED_VERSIONS[*]}"
        else
          IFS=',' read -ra SUPPORTED_VERSIONS <<< "$FIP_INPUT"
          echo "Will parse selected: ${SUPPORTED_VERSIONS[*]}"
        fi

        for version in "${SUPPORTED_VERSIONS[@]}"; do
          models=$(make -s board-configs VERSION="$version" || true)
          if [ -z "$models" ]; then
            echo "No available models found for $version: missing ATF/UBoot defconfig intersection, skipping"
            continue
          fi
          if [ -n "$SOC_FILTER" ]; then
            models=$(echo "$models" | grep -E "^${SOC_FILTER}_" || true)
            if [ -z "$models" ]; then
              echo "Platform $SOC_FILTER has no available models in $version, skipping"
              continue
            fi
          fi
          list_file="model_lists/model_list_${version}.txt"
          echo "$models" | sort -u > "$list_file"
          echo "Generated model list: $list_file"
        done

        echo "Generated model list files:"
        ls -l model_lists/
        for f in model_lists/model_list_*.txt; do
          echo "List contents - $f:"
          cat "$f" || echo "(empty)"
        done

        echo "MODEL_LIST_DIR=$PWD/model_lists" >> $GITHUB_ENV
        echo "MODEL_LIST_READY=1" >> $GITHUB_ENV

    - name: Build FIP
      id: compile
      run: |
        cd bl-mt798x-dhcpd
        chmod +x ./build.sh
        mkdir -p output

        VARIANT_INPUT="${{ github.event.inputs.VARIANT }}"
        EXTRA_INPUT="${{ github.event.inputs.EXTRA_OPTION }}"
        
        FIP_INPUT="$FIP_VERSION_INPUT"
        FIP_INPUT="$(echo "$FIP_INPUT" | tr -d '\r' | sed -e 's/^[[:space:]]*//;s/[[:space:]]*$//')"
        SOC_FILTER=""
        if [[ "$FIP_INPUT" =~ ^(.+)-(mt798[0-9]+)$ ]]; then
          FIP_INPUT="${BASH_REMATCH[1]}"
          SOC_FILTER="${BASH_REMATCH[2]}"
          echo "Detected platform filter: $SOC_FILTER (will only build models for that platform)"
        fi

        # Parse the list of versions to process based on FIP_INPUT
        if [ "$FIP_INPUT" = "all" ]; then
          SUPPORTED_VERSIONS=("SP1" "SP2" "2025")
          echo "Detected 'all', will build: ${SUPPORTED_VERSIONS[*]}"
        else
          IFS=',' read -ra SUPPORTED_VERSIONS <<< "$FIP_INPUT"
          echo "Will build selected: ${SUPPORTED_VERSIONS[*]}"
        fi

        MODEL_INPUT="${{ github.event.inputs.MODEL }}"
        if [[ "$MODEL_INPUT" =~ ^all-(mt798[0-9]+)$ ]]; then
          MODEL_INPUT="all"
          if [ -z "$SOC_FILTER" ]; then
            SOC_FILTER="${BASH_REMATCH[1]}"
          fi
          echo "Detected model input with platform filter: $SOC_FILTER (MODEL=all-mt798x)"
        fi

        # Compile each version and cache outputs in separate temp directories
        for version in "${SUPPORTED_VERSIONS[@]}"; do
          echo "Preparing FIP for version ${version}..."
          list_file="model_lists/model_list_${version}.txt"
          if [ ! -s "$list_file" ]; then
            echo "Model list file not found ($list_file), skipping $version"
            continue
          fi
          models=$(cat "$list_file" || true)
          if [ -z "$models" ]; then
            echo "Model list empty ($version), skipping"
            continue
          fi
          if [ -n "$SOC_FILTER" ]; then
            models=$(echo "$models" | grep -E "^${SOC_FILTER}_" || true)
            if [ -z "$models" ]; then
              echo "Platform $SOC_FILTER has no available models in $version, skipping"
              continue
            fi
          fi

          echo "Available models for ${version}:"
          echo "$models" | tr '\n' ' '
          echo

          # Compile all if MODEL_INPUT=all, otherwise filter by model name suffix
          if [ "$MODEL_INPUT" = "all" ]; then
            BUILD_MODELS="$models"
          else
            BUILD_MODELS=""
            while read -r entry; do
              [ -z "$entry" ] && continue
              model_name="${entry#*_}"
              if [ "$model_name" = "$MODEL_INPUT" ]; then
                BUILD_MODELS+="$entry "
              fi
            done <<< "$models"
            if [ -z "$BUILD_MODELS" ]; then
              echo "Model $MODEL_INPUT not found in version $version, skipping"
              continue
            fi
          fi

          # Decide variant list for this version (version priority first)
          if [ "$version" = "2025" ] || [ "$version" = "SP1" ] || [ "$version" = "SP2" ]; then
            if [ "$VARIANT_INPUT" = "all" ]; then
              VARIANTS_TO_BUILD=(default ubootmod nonmbm openwrt)
            else
              VARIANTS_TO_BUILD=($VARIANT_INPUT)
            fi
          else
            VARIANTS_TO_BUILD=(default)
          fi

          for VARIANT in "${VARIANTS_TO_BUILD[@]}"; do
            for entry in $BUILD_MODELS; do
              soc="${entry%%_*}"
              model_name="${entry#*_}"

              # EXTRA_OPTION: effects all versions
              case "$EXTRA_INPUT" in
                default)
                  MULTI_LAYOUT=0
                  FIXED_MTDPARTS=1
                  ;;
                multi_layout)
                  MULTI_LAYOUT=1
                  FIXED_MTDPARTS=1
                  ;;
                dis_fixed_mtdparts)
                  MULTI_LAYOUT=0
                  FIXED_MTDPARTS=0
                  ;;
              esac

              # variant ubootmod/openwrt does not support multi_layout
              if [ "$VARIANT" = "ubootmod" ] || [ "$VARIANT" = "openwrt" ]; then
                MULTI_LAYOUT=0
              fi

              echo "Building FIP for version ${version} (SOC: $soc, model: $model_name, variant: $VARIANT)..."
              if make BOARD="$model_name" VERSION="$version" VARIANT="$VARIANT" MULTI_LAYOUT="$MULTI_LAYOUT" FIXED_MTDPARTS="$FIXED_MTDPARTS" SILENT=Y; then
                build_rc=0
              else
                build_rc=$?
              fi

              if [ "$build_rc" -ne 0 ]; then
                echo "Build failed: soc=$soc model=$model_name version=$version variant=$VARIANT (rc=$build_rc), continuing to next"
              fi
            done
          done

          mkdir -p "temp_output_${version}"
          if [ -d "output" ]; then
            cp -r output/* "temp_output_${version}/" || true
            rm -rf output/*
          fi
        done

        # Merge all version outputs into the output directory
        mkdir -p output
        for version in "${SUPPORTED_VERSIONS[@]}"; do
          cp -r "temp_output_${version}/"* output/ || true
        done

        # Clean up temp directories
        for version in "${SUPPORTED_VERSIONS[@]}"; do
          rm -rf "temp_output_${version}"
        done
        
        echo "FILE_DATE=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Show disk usage
      if: (!cancelled())
      run: df -hT

    - name: Organize files and rename
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: | 
        cd bl-mt798x-dhcpd
        # Get current timestamp
        TIMESTAMP=$(date +"%Y%m%d-%H%M%S")
        # Mark custom subnet (append _customnet suffix, then timestamp)
        if [ "${{ env.CUSTOM_NET }}" = "1" ]; then
          for dir in output output_gpt; do
            if [ -d "$dir" ]; then
              for file in "$dir"/*; do
                [ -f "$file" ] || continue
                mv "$file" "${file%.*}_customnet.${file##*.}"
              done
            fi
          done
        fi
        # Rename files in output directory
        if [ -d "output" ]; then
          rename "s/(.*)\.(.*)/\$1_${TIMESTAMP}.\$2/" output/*
        fi
        # Rename files in output_gpt directory
        if [ -d "output_gpt" ]; then
          rename "s/(.*)\.(.*)/\$1_${TIMESTAMP}.\$2/" output_gpt/*
        fi
        # Move files to upload directory (binaries, logs, GPT, model lists)
        mkdir -p upload
        if [ -d "output" ]; then
          cp -r output/* upload/ || true
        fi
        if [ -d "output_gpt" ]; then
          cp -r output_gpt/* upload/ || true
        fi
        if [ -d "model_lists" ]; then
          cp -r model_lists/* upload/ || true
        fi

        # Compress all logs into a single tar.gz and remove original logs
        if ls upload/build-*.log >/dev/null 2>&1; then
          tar -czf upload/build-logs_${TIMESTAMP}.tar.gz upload/build-*.log
          rm -f upload/build-*.log
        fi

        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload artifacts to Actions
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: ${{ env.FILE_DATE }}-${{ env.UPLOAD_TAG_NAME }}
        path: |
          bl-mt798x-dhcpd/upload/*

    - name: Generate release notes
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        touch release.txt

        echo "- Commit: ${{ env.SOURCE_SHA }}" >> release.txt
        echo "- Target models: ${{ env.UPLOAD_TAG_NAME }}" >> release.txt
        echo "- Source repo: ${{ env.REPO_URL }}" >> release.txt
        echo "- Branch: ${{ env.REPO_BRANCH }}" >> release.txt
        echo "- Versions: $FIP_VERSION_INPUT" >> release.txt

        echo "- Extra options: ${{ github.event.inputs.EXTRA_OPTION }}" >> release.txt

        if [ "${{ github.event.inputs.VARIANT }}" = "all" ]; then
          echo "- Enabled ALL variants (default/ubootmod/nonmbm/openwrt)" >> release.txt
        elif [ "${{ github.event.inputs.VARIANT }}" = "nonmbm" ]; then
          echo "- Enabled NONMBM variant" >> release.txt
        elif [ "${{ github.event.inputs.VARIANT }}" = "ubootmod" ]; then
          echo "- Enabled UBOOTMOD variant" >> release.txt
        elif [ "${{ github.event.inputs.VARIANT }}" = "openwrt" ]; then
          echo "- Enabled OPENWRT variant" >> release.txt
          echo "- OPENWRT variant with **NO failsafe WEB UI**" >> release.txt
          echo "- YOU NEED UPGRADE WITH TFTP METHOD" >> release.txt
        else
          echo "- Using DEFAULT variant" >> release.txt
        fi

        if [ "${{ github.event.inputs.EXTRA_OPTION }}" = "dis_fixed_mtdparts" ]; then
          echo "- FIXED_MTDPARTS disabled" >> release.txt
        elif [ "${{ github.event.inputs.EXTRA_OPTION }}" = "multi_layout" ]; then
          echo "- MULTI_LAYOUT enabled" >> release.txt
        fi
        if [ "${{ github.event.inputs.MODEL }}" = "all" ]; then
          echo "- Model list files for each version output (MODEL=all)" >> release.txt
        fi
        echo "- Build time: ${{ env.FILE_DATE }}" >> release.txt

        echo "" >> release.txt
        echo "---" >> release.txt
        echo "" >> release.txt
        echo "**PLEASE SEE THE README FOR USAGE INSTRUCTIONS AND DISCLAIMERS.**" >> release.txt
        echo "release_tag=${{ env.FILE_DATE }}-${{ env.UPLOAD_TAG_NAME }}" >> $GITHUB_OUTPUT
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Publish to GitHub Release
      uses: softprops/action-gh-release@v2.1.0
      if: steps.tag.outputs.status == 'success' && !cancelled() && env.UPLOAD_RELEASE == 'true'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        files: bl-mt798x-dhcpd/upload/*
        release_name: ${{ env.FILE_DATE }}-${{ env.UPLOAD_TAG_NAME }}
        name: ${{ env.FILE_DATE }}-${{ env.UPLOAD_TAG_NAME }}
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt