name: Build Comfast CF-WR632AX (SP2, ubootmod)

on:
  workflow_dispatch:

env:
  REPO_URL: 'https://github.com/DarkAssassinUA/bl-mt798x-dhcpd'
  REPO_BRANCH: 'master'
  TZ: Europe/Kyiv
  UPLOAD_ARTIFACT: true
  UPLOAD_RELEASE: true

jobs:
  build:
    runs-on: ubuntu-22.04

    permissions:
      contents: write

    steps:
      - name: Initialize build environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install git rename tar
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: Checkout source
        working-directory: /workdir
        run: |
          df -hT $PWD
          git clone $REPO_URL -b $REPO_BRANCH bl-mt798x-dhcpd
          ln -sf /workdir/bl-mt798x-dhcpd $GITHUB_WORKSPACE/bl-mt798x-dhcpd

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo -E apt-get -qq install $(cat bl-mt798x-dhcpd/depends/ubuntu-22.04)

      - name: Build FIP
        shell: bash
        run: |
          set -euo pipefail
          cd bl-mt798x-dhcpd
          
          # Run build command for the specific board
          make BOARD=comfast_cf-wr632ax VERSION=SP2 VARIANT=ubootmod FSTHEME=leboot

          # Get LEBOOT version dynamically from main.js
          leboot_version=$(grep -oE "LEBOOT v[0-9.]+" uboot-mtk-20250711/failsafe/embedded/fsdata_leboot/main.js | head -n 1 | tr -d '\r\n')
          [ -z "$leboot_version" ] && { echo "ERROR: LEBOOT version not found in main.js"; exit 1; }
          leboot_tag=$(echo "$leboot_version" | tr ' ' '-' | tr -d '\r\n')

          echo "FILE_DATE=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_ENV
          echo "LEBOOT_VER=$leboot_version" >> $GITHUB_ENV
          echo "LEBOOT_TAG=$leboot_tag" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Organize files and rename
        id: organize
        if: env.UPLOAD_ARTIFACT == 'true' && !cancelled()
        shell: bash
        run: |
          set -euo pipefail
          cd bl-mt798x-dhcpd

          TIMESTAMP=$(date +"%Y%m%d-%H%M")
          leboot_tag="$LEBOOT_TAG"

          mkdir -p upload
          if [ -d "output" ]; then
            for f in output/*.bin output/*.fip; do
              [ -f "$f" ] || continue
              # Rename: LEBOOT-v1.2-20260528-2028.fip
              newname="upload/${leboot_tag}-${TIMESTAMP}.fip"
              cp "$f" "$newname"
            done
          fi

          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload artifacts to Actions
        uses: actions/upload-artifact@main
        if: steps.organize.outputs.status == 'success' && !cancelled()
        with:
          name: ${{ env.FILE_DATE }}-${{ env.LEBOOT_TAG }}
          path: |
            bl-mt798x-dhcpd/upload/*

      - name: Generate release notes
        id: tag
        if: env.UPLOAD_RELEASE == 'true' && !cancelled()
        shell: bash
        run: |
          set -euo pipefail
          touch release.txt

          echo "DEBUG: FILE_DATE='${{ env.FILE_DATE }}'"
          echo "DEBUG: LEBOOT_VER='${{ env.LEBOOT_VER }}'"
          echo "DEBUG: LEBOOT_TAG='${{ env.LEBOOT_TAG }}'"

          echo "- Коммит: ${{ github.sha }}" >> release.txt
          echo "- Версия: ${{ env.LEBOOT_VER }}" >> release.txt
          echo "- Время сборки: ${{ env.FILE_DATE }}" >> release.txt
          echo "release_tag=${{ env.FILE_DATE }}-${{ env.LEBOOT_TAG }}" >> $GITHUB_OUTPUT
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        if: steps.tag.outputs.status == 'success' && !cancelled() && env.UPLOAD_RELEASE == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: bl-mt798x-dhcpd/upload/*
          name: ${{ env.FILE_DATE }}-${{ env.LEBOOT_TAG }}
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
