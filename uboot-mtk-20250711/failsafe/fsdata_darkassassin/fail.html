<!DOCTYPE HTML>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Update failed</title>
	<script src="/theme.js"></script>
	<link rel="stylesheet" href="/style.css">
	<script src="/i18n.js"></script>
	<script src="/main.js"></script>
</head>

<body onload="appInit('fail')" data-page="fail">
	<div class="app">
		<aside id="sidebar" class="sidebar"></aside>
		<div class="main">
			<div id="m">
				<div class="card-main status-card">
					<div class="status-hero status-hero-danger" aria-hidden="true">
						<svg viewBox="0 0 24 24" width="44" height="44" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
							<circle cx="12" cy="12" r="10"></circle>
							<line x1="15" y1="9" x2="9" y2="15"></line>
							<line x1="9" y1="9" x2="15" y2="15"></line>
						</svg>
					</div>
					<h1 class="red" data-i18n="fail.title">UPDATE FAILED</h1>
					<div class="status-feedback">
						<p data-i18n="fail.msg.strong" style="font-weight: 600;">Something went wrong during update</p>
						<p data-i18n="fail.msg.rest" style="color: var(--muted); font-size: 0.85rem; max-width: 480px; margin: 0 auto;">
							Probably you have chosen wrong file. Please, try again or contact
							with the author of this modification. You can also get more information during update in
							U-Boot console.
						</p>
					</div>
				</div>
			</div>
			<div id="version"></div>
		</div>
	</div>
</body>

</html>
